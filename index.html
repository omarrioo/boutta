<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Project Boutta ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Lock Screen -->

    <section id="lock-screen" class="screen active">

        <div class="lock-content">

            <div id="time" class="time">
                12:39
            </div>

            <div id="date" class="date">
                Saturday, June 27
            </div>

            <div class="notification">

                <div class="notification-header">

                    <span>Messages</span>

                    <span>now</span>

                </div>

                <div class="sender">

                    Omar ❤️

                </div>

                <div class="preview">

                    ▇▇▇▇▇▇▇▇▇▇

                </div>

            </div>

            <div class="unlock-text">

                Tap anywhere to unlock

            </div>

        </div>

    </section>

    <!-- Face ID -->

    <section id="face-screen" class="screen">

        <div class="face-container">

            <div class="face-box">

            </div>

            <h2>

                Face ID

            </h2>

            <p>

                Identifying...

            </p>

        </div>

    </section>

    <!-- Hello -->

    <section id="hello-screen" class="screen">

        <div class="hello">

            Hello,

            <br>

            Boutta ❤️

        </div>

    </section>

<script src="script.js"></script>

</body>

</html>
