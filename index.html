<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Project Boutta ❤️</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Lock Screen -->

    <section id="lock-screen" class="screen active">
      <div class="lock-content">
        <div id="time" class="time">12:39</div>

        <div id="date" class="date">Saturday, June 27</div>

        <div class="notification">
          <div class="notification-top">

    <div class="notification-left">

        💬 Messages

    </div>

    <div class="notification-right">

        now

    </div>

</div>

          <div class="sender">Omar ❤️</div>

          <div class="message-preview">

    <div class="blur-line w90"></div>

    <div class="blur-line w65"></div>

</div>

        <div class="unlock">

    <div class="arrow">
        ↑
    </div>

    <span>

        Swipe up to unlock

    </span>

</div>
    </section>

    <!-- Face ID -->

    <section id="face-screen" class="screen">

    <div class="face-wrapper">

        <div class="face-icon">

            <svg viewBox="0 0 120 120">

                <!-- Corners -->
                <path d="M25 10 H10 V25" />
                <path d="M95 10 H110 V25" />
                <path d="M10 95 V110 H25" />
                <path d="M110 95 V110 H95" />

                <!-- Face -->
                <circle cx="60" cy="46" r="4"/>
                <circle cx="42" cy="46" r="4"/>

                <path d="M51 63 Q60 70 69 63"/>

            </svg>

            <div class="scan-line"></div>

        </div>

        <h2>Face ID</h2>

        <p id="face-status">

            Scanning...

        </p>

    </div>

</section>

    <!-- Hello -->

    <section id="hello-screen" class="screen">

    <div class="hello-wrapper">

        <div id="identity-confirmed" class="identity-confirmed">

            <div class="check-circle">

                ✓

            </div>

            <p>

                Identity Confirmed

            </p>

        </div>

        <div id="hello-message" class="hello-message">

            <h1>

                Hello,

            </h1>

            <h2>

                Boutta ❤️

            </h2>

        </div>

    </div>

</section>

    <script src="script.js"></script>
  </body>
</html>
